name: budget_app
description: "NewBudgetApp — a local-first, cross-platform budgeting app inspired by YNAB."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

# NOTE: Version constraints below are indicative minimums. Task M0-T02 must run
# `flutter pub get` / `flutter pub outdated` and resolve to the latest compatible
# set. If a major version changed (e.g. Riverpod 3.x), update affected docs.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (Riverpod + code generation)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local persistence (Drift over SQLite) — see docs/03-data-model.md
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Navigation
  go_router: ^14.6.2

  # Immutable models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  collection: ^1.19.0

  # Feature support
  fl_chart: ^0.69.2
  file_picker: ^8.1.6
  csv: ^6.0.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^7.0.0

  # Code generation (all run by a single `dart run build_runner build`)
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
