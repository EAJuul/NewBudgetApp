name: budget_app
description: "NewBudgetApp — a local-first, cross-platform budgeting app inspired by YNAB."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

# NOTE: Version constraints are indicative minimums. Task M0-T02 must run
# `flutter pub get` / `flutter pub outdated` and resolve to the latest
# compatible set. If a major version changed (e.g. Riverpod 3.x), update the
# affected docs. Dependencies are sorted alphabetically (lint:
# sort_pub_dependencies); see docs/02-architecture.md for what each is for.
dependencies:
  collection: ^1.19.0
  csv: ^8.0.0
  cupertino_icons: ^1.0.8
  drift: ^2.23.1
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  intl: ^0.20.1
  json_annotation: ^4.9.0
  meta: ^1.15.0
  path: ^1.9.0
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.3
  sqlite3_flutter_libs: ^0.6.0+eol
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
